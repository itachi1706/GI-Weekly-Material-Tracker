version: 2
enable-beta-ecosystems: true
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 7
    schedule:
      interval: "daily"
  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/util"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 7
    schedule:
      interval: "daily"
  # Maintain dependencies for Firebase Cloud Functions
  - package-ecosystem: "npm"
    directory: "/firebase/functions"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 7
    schedule:
      interval: "daily"
  # Maintain dependencies for Gradle Android App
  - package-ecosystem: "gradle"
    directory: "/android"
    commit-message:
      prefix: "build"
      include: "scope"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 7
    schedule:
      interval: "daily"
  # Maintain dependencies for dart (BETA)
  - package-ecosystem: "pub"
    directory: "/"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 7
    schedule:
      interval: "daily"
